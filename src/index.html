<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Twitch Notifications</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap");

      * {
        font-family: "Inter", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        min-height: 100vh;
      }

      dialog {
        border: none;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      dialog::backdrop {
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
      }

      .channel-card {
        transition: all 0.3s ease;
        background: linear-gradient(145deg, #2d3748 0%, #1a202c 100%);
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        transition: all 0.3s ease;
      }

      .btn-primary:hover {
        transform: scale(1.05);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
      }

      .btn-success {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      }

      .btn-success:hover {
        transform: scale(1.05);
        box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
      }

      .btn-danger {
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      }

      .btn-danger:hover {
        transform: scale(1.05);
        box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4);
      }

      .btn-kick {
        background: #53fc18;
        color: #000;
        font-weight: 700;
      }

      .btn-kick:hover {
        background: #45d614;
        transform: scale(1.05);
      }

      .btn-ytb {
        background: #FF0033;
        color: #fff;
        font-weight: 700;
      }
      
      .btn-ytb:hover {
        background: #FF0033;
        transform: scale(1.05);
      }
      .btn-twt {
        background: #9146FF;
        color: #fff;
        font-weight: 700;
      }
      
      .game-tag {
        background: rgba(139, 92, 246, 0.2);
        border: 1px solid rgba(139, 92, 246, 0.4);
        backdrop-filter: blur(10px);
      }

      input:focus {
        outline: none;
        ring: 2px;
        ring-color: #667eea;
      }

      .header-gradient {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }

      .empty-state {
        background: rgba(45, 55, 72, 0.5);
        border: 2px dashed rgba(139, 92, 246, 0.3);
      }
    </style>
  </head>
  <body class="antialiased">
    <!-- Add Channel Dialog -->
    <dialog
      id="addChannelDialog"
      class="rounded-2xl bg-gray-800 text-white w-11/12 max-w-md p-0 overflow-hidden"
    >
      <div class="bg-gradient-to-r from-purple-600 to-indigo-600 px-6 py-4">
        <h2 class="text-2xl font-bold">Add Twitch Channel</h2>
      </div>
      <div class="p-6">
        <div class="mb-4">
          <label class="block text-sm font-semibold mb-2 text-gray-300"
            >Channel Name</label
          >
          <input
            class="w-full bg-gray-700 rounded-lg text-white px-4 py-3 focus:ring-2 focus:ring-purple-500 transition"
            placeholder="Enter channel name..."
            id="addChannelInput"
            autofocus
            autocomplete="off"
            type="text"
          />
        </div>
        <div
          id="addChannelMessage"
          class="text-sm mb-4 text-center font-medium"
        ></div>
        <div class="flex gap-3">
          <button
            id="cancelAddChannel"
            class="flex-1 rounded-lg font-semibold text-gray-300 hover:bg-gray-700 transition py-3"
          >
            Cancel
          </button>
          <button
            id="confirmAddChannel"
            class="flex-1 btn-primary rounded-lg font-semibold text-white py-3"
          >
            Add Channel
          </button>
        </div>
      </div>
    </dialog>

    <!-- Add Kick Channel Dialog -->
    <dialog
      id="addKickDialog"
      class="rounded-2xl bg-gray-800 text-white w-11/12 max-w-md p-0 overflow-hidden"
    >
      <div class="bg-gradient-to-r from-green-500 to-emerald-600 px-6 py-4">
        <h2 class="text-2xl font-bold">Add Kick Channel</h2>
      </div>
      <div class="p-6">
        <div class="mb-4">
          <label class="block text-sm font-semibold mb-2 text-gray-300"
            >Kick Channel Name</label
          >
          <input
            class="w-full bg-gray-700 rounded-lg text-white px-4 py-3 focus:ring-2 focus:ring-green-500 transition"
            placeholder="Enter Kick channel name..."
            id="addKickInput"
            autofocus
            autocomplete="off"
            type="text"
          />
        </div>
        <div
          id="addKickMessage"
          class="text-sm mb-4 text-center font-medium"
        ></div>
        <div class="flex gap-3">
          <button
            id="cancelAddKick"
            class="flex-1 rounded-lg font-semibold text-gray-300 hover:bg-gray-700 transition py-3"
          >
            Cancel
          </button>
          <button
            id="confirmAddKick"
            class="flex-1 btn-success rounded-lg font-semibold text-white py-3"
          >
            Add Channel
          </button>
        </div>
      </div>
    </dialog>

    <!-- Add Youtube Channel Dialog -->
    <dialog
      id="addYoutubeDialog"
      class="rounded-2xl bg-gray-800 text-white w-11/12 max-w-md p-0 overflow-hidden"
    >
      <div class="bg-gradient-to-r from-green-500 to-emerald-600 px-6 py-4">
        <h2 class="text-2xl font-bold">Add Youtube Channel</h2>
      </div>
      <div class="p-6">
        <div class="mb-4">
          <label class="block text-sm font-semibold mb-2 text-gray-300"
            >Youtube Channel Id</label
          >
          <input
            class="w-full bg-gray-700 rounded-lg text-white px-4 py-3 focus:ring-2 focus:ring-green-500 transition"
            placeholder="Enter Youtube channel id..."
            id="addYoutubeInput"
            autofocus
            autocomplete="off"
            type="text"
          />
        </div>
        <div
          id="addYoutubeMessage"
          class="text-sm mb-4 text-center font-medium"
        ></div>
        <div class="flex gap-3">
          <button
            id="cancelAddYoutube"
            class="flex-1 rounded-lg font-semibold text-gray-300 hover:bg-gray-700 transition py-3"
          >
            Cancel
          </button>
          <button
            id="confirmAddYoutube"
            class="flex-1 btn-success rounded-lg font-semibold text-white py-3"
          >
            Add Channel
          </button>
        </div>
      </div>
    </dialog>

    <!-- Header -->
    <header
      class="sticky top-0 z-50 backdrop-blur-lg bg-gray-900/80 border-b border-gray-700"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-20">
          <div class="flex items-center gap-4">
            <div
              class="w-12 h-12 rounded-xl bg-gradient-to-br from-purple-500 to-indigo-600 flex items-center justify-center"
            >
              <svg
                class="w-7 h-7 text-white"
                fill="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"
                />
              </svg>
            </div>
            <div>
              <h1 class="text-2xl font-bold text-white">
                Twitch Notifications
              </h1>
              <p class="text-sm text-gray-400">
                Manage your streaming channels
              </p>
            </div>
          </div>
          <div class="flex items-center gap-4">
            <div id="notificationStatus" class="hidden text-sm">
              <!-- Notification status will be shown here -->
            </div>
            <button
              id="addButton"
              class="btn-primary px-6 py-3 rounded-xl font-semibold text-white flex items-center gap-2"
            >
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 4v16m8-8H4"
                />
              </svg>
              Add Channel
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
      <div
        id="list"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
      ></div>
      <div
        id="emptyState"
        class="hidden empty-state rounded-2xl p-12 text-center"
      >
        <div
          class="w-20 h-20 mx-auto mb-4 rounded-full bg-purple-500/20 flex items-center justify-center"
        >
          <svg
            class="w-10 h-10 text-purple-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"
            />
          </svg>
        </div>
        <h3 class="text-xl font-bold text-white mb-2">No Channels Yet</h3>
        <p class="text-gray-400 mb-6">
          Start by adding your first Twitch channel
        </p>
        <button
          class="btn-primary px-6 py-3 rounded-xl font-semibold text-white inline-flex items-center gap-2"
          onclick="document.getElementById('addButton').click()"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4v16m8-8H4"
            />
          </svg>
          Add Your First Channel
        </button>
      </div>
    </main>

    <script type="module">
      // Store channels globally
      window.channels = [];

      // Dialog handlers
      document.getElementById("addButton").onclick = () => {
        document.getElementById("addChannelDialog").showModal();
        document.getElementById("addChannelInput").value = "";
        document.getElementById("addChannelMessage").textContent = "";
      };

      document.getElementById("cancelAddChannel").onclick = () => {
        document.getElementById("addChannelDialog").close();
      };

      document.getElementById("confirmAddChannel").onclick = async () => {
        const channel = document.getElementById("addChannelInput").value.trim();
        const msg = document.getElementById("addChannelMessage");
        if (!channel) {
          msg.textContent = "Please enter a channel name.";
          msg.className = "text-sm mb-4 text-center font-medium text-red-400";
          return;
        }
        msg.textContent = "Adding channel...";
        msg.className = "text-sm mb-4 text-center font-medium text-yellow-400";
        try {
          const res = await fetch("/api/add-channel", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ channel }),
          });
          if (res.ok) {
            msg.textContent = "Channel added successfully!";
            msg.className =
              "text-sm mb-4 text-center font-medium text-green-400";
            setTimeout(() => {
              document.getElementById("addChannelDialog").close();
              location.reload();
            }, 800);
          } else {
            msg.textContent = "Failed to add channel.";
            msg.className = "text-sm mb-4 text-center font-medium text-red-400";
          }
        } catch (e) {
          msg.textContent = "Error connecting to server.";
          msg.className = "text-sm mb-4 text-center font-medium text-red-400";
        }
      };

      // Kick Channel Dialog
      let selectedTwitchIdx = null;
      document.addEventListener("click", function (e) {
        if (e.target.closest(".add-kick-btn")) {
          const btn = e.target.closest(".add-kick-btn");
          selectedTwitchIdx = btn.getAttribute("data-idx");
          document.getElementById("addKickDialog").showModal();
          document.getElementById("addKickInput").value = "";
          document.getElementById("addKickMessage").textContent = "";
        }
      });

      document.getElementById("cancelAddKick").onclick = () => {
        document.getElementById("addKickDialog").close();
      };

      document.getElementById("confirmAddKick").onclick = async () => {
        const kickChannel = document
          .getElementById("addKickInput")
          .value.trim();
        const msg = document.getElementById("addKickMessage");
        if (!kickChannel) {
          msg.textContent = "Please enter a Kick channel name.";
          msg.className = "text-sm mb-4 text-center font-medium text-red-400";
          return;
        }
        msg.textContent = "Adding Kick channel...";
        msg.className = "text-sm mb-4 text-center font-medium text-yellow-400";
        try {
          const twitchChannel =
            window.channels?.[selectedTwitchIdx]?.display_name;
          const res = await fetch("/api/add-kick-channel", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ twitch: twitchChannel, kick: kickChannel }),
          });
          if (res.ok) {
            msg.textContent = "Kick channel added!";
            msg.className =
              "text-sm mb-4 text-center font-medium text-green-400";
            setTimeout(() => {
              document.getElementById("addKickDialog").close();
              location.reload();
            }, 800);
          } else {
            msg.textContent = "Failed to add Kick channel.";
            msg.className = "text-sm mb-4 text-center font-medium text-red-400";
          }
        } catch (e) {
          msg.textContent = "Error connecting to server.";
          msg.className = "text-sm mb-4 text-center font-medium text-red-400";
        }
      };

      // Youtube Dialog
      document.addEventListener("click", function (e) {
        if (e.target.closest(".add-ytb-btn")) {
          const btn = e.target.closest(".add-ytb-btn");
          selectedTwitchIdx = btn.getAttribute("data-idx");
          document.getElementById("addYoutubeDialog").showModal();
          document.getElementById("addYoutubeInput").value = "";
          document.getElementById("addYoutubeMessage").textContent = "";
        }
      });

      document.getElementById("cancelAddYoutube").onclick = () => {
        document.getElementById("addYoutubeDialog").close();
      };

      document.getElementById("confirmAddYoutube").onclick = async () => {
        const youtubeChannel = document
          .getElementById("addYoutubeInput")
          .value.trim();
        const msg = document.getElementById("addYoutubeMessage");
        if (!youtubeChannel) {
          msg.textContent = "Please enter a Youtube channel ID.";
          msg.className = "text-sm mb-4 text-center font-medium text-red-400";
          return;
        }
        msg.textContent = "Adding Youtube channel...";
        msg.className = "text-sm mb-4 text-center font-medium text-yellow-400";
        try {
          const twitchChannel =
            window.channels?.[selectedTwitchIdx]?.display_name;
          const res = await fetch("/api/add-youtube-channel", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ twitch: twitchChannel, youtube: youtubeChannel }),
          });
          if (res.ok) {
            msg.textContent = "Youtube channel added!";
            msg.className =
              "text-sm mb-4 text-center font-medium text-green-400";
            setTimeout(() => {
              document.getElementById("addYoutubeDialog").close();
              location.reload();
            }, 800);
          } else {
            msg.textContent = "Failed to add Youtube channel.";
            msg.className = "text-sm mb-4 text-center font-medium text-red-400";
          }
        } catch (e) {
          msg.textContent = "Error connecting to server.";
          msg.className = "text-sm mb-4 text-center font-medium text-red-400";
        }
      };


      // Fetch and render channels
      async function loadChannels() {
        try {
          const response = await fetch("./channels_list.txt");
          const text = await response.text();
          const channelsList = JSON.parse(text);

          if (channelsList.length === 0) {
            document.getElementById("emptyState").classList.remove("hidden");
            return;
          }

          const channelsArr = channelsList.map((c) => c.name);
          const channelsNames = channelsArr.map(
            (e, i) => `${i === 0 ? "?" : "&"}login=${e}`
          );
          const channelsString = channelsNames.join("");
          const CHANNELS_URL = `https://api.twitch.tv/helix/users${channelsString}`;

          // You'll need to implement getChannels or fetch directly
          // For now, assuming you have a way to get channel data
          const channelsData = await fetchChannelData(
            channelsArr,
            CHANNELS_URL
          );

          window.channels = channelsData.map((c) => {
            const channel = channelsList.find(
              (ch) => c.display_name.toLowerCase() === ch.name
            );
            c.games = channel?.games || [];
            c.kick = channel?.kick || null;
            c.youtube = channel?.youtube || null;
            c.priority = normalizePriority(channel?.priority);
            return c;
          });

          renderChannels(window.channels);
        } catch (error) {
          console.error("Error loading channels:", error);
        }
      }

      let configs = {
        token: "",
      };


      const getChannels = async (e) => {
        const TWITCH_CLIENT_ID = "g23nf3u0ej1o7jkzi04q93n735jawx";
        const TWITCH_SECRET = "ir8jymwkw9xlf0u9moj0hochqry2z0";
        const TOKEN_URL = `https://id.twitch.tv/oauth2/token?client_id=${TWITCH_CLIENT_ID}&client_secret=${TWITCH_SECRET}&grant_type=client_credentials`;

        const options = {
          method: "POST",
          json: true,
        };

        const token = await fetch(TOKEN_URL, options);
        const res = await token.json();

        configs.token = res.access_token;

        if (configs.token) {
          const get_channels_options = {
            method: "GET",
            headers: {
              "Client-ID": TWITCH_CLIENT_ID,
              Authorization: "Bearer " + configs.token,
            },
          };

          const channels = await fetch(e.url, get_channels_options);
          const channels_res = await channels.json();

          return channels_res.data;
        }
      };

      async function fetchChannelData(channels, url) {
        try {
          const channelsData = await getChannels({ url });
          return channelsData || [];
        } catch (error) {
          console.error("Error fetching channel data:", error);
          return [];
        }
      }

      function normalizePriority(priority) {
        const allowed = ["twt", "ytb", "kick"];
        const normalized = [];

        (Array.isArray(priority) ? priority : []).forEach((value) => {
          const item = String(value).toLowerCase();
          if (allowed.includes(item) && !normalized.includes(item)) {
            normalized.push(item);
          }
        });

        allowed.forEach((value) => {
          if (!normalized.includes(value)) {
            normalized.push(value);
          }
        });

        return normalized;
      }

      function renderChannels(channels) {
        const listElement = document.getElementById("list");

        console.log(channels);
        listElement.innerHTML = channels
          .sort((a, b) => a.display_name.localeCompare(b.display_name))
          .map(
            (c, idx) => `
            <div class="channel-card rounded-2xl overflow-hidden shadow-xl">
              <!-- Channel Banner -->
              <div class="relative h-40 overflow-hidden">
                <img
                  class="w-full h-full object-cover"
                  src="${
                    c.offline_image_url ||
                    "https://static.vecteezy.com/system/resources/thumbnails/053/821/289/small_2x/offline-glitch-banner-glitch-effect-offline-video.jpg"
                  }"
                  alt="${c.display_name} banner"
                />
                <div class="absolute inset-0 bg-gradient-to-t from-gray-900 to-transparent"></div>
              </div>

              <!-- Channel Info -->
              <div class="p-5">
                <div class="flex items-start gap-4 mb-4">
                  <img 
                    class="w-16 h-16 rounded-full border-4 border-gray-700 -mt-10 relative z-10" 
                    src="${c.profile_image_url}" 
                    alt="${c.display_name}"
                  />
                  <div class="flex-1 mt-2">
                    <a 
                      href="https://twitch.tv/${c.display_name}" 
                      target="_blank"
                      class="text-lg font-bold text-white hover:text-purple-400 transition block"
                    >
                      ${c.display_name}
                    </a>
                    <p class="text-sm text-gray-400 line-clamp-2" title="${
                      c.description || "No description"
                    }">
                      ${c.description || "No description available"}
                    </p>
                  </div>
                </div>

                <!-- Kick Channel Display Section -->
                <div class="flex gap-2">
                  ${
                    c.kick
                      ? `
                    <div class="mb-4 w-full bg-gradient-to-r from-green-500/10 to-emerald-500/10 border border-green-500/30 rounded-lg p-3">
                      <div class="flex items-center gap-2">
                        <img src="/kick.svg" alt="Kick" class="fill-white w-4 h-4 mr-1" />
                        <div class="flex-1">
                          <div class="text-xs font-semibold text-green-400 uppercase tracking-wide">Kick</div>
                          <a
                            href="https://kick.com/${c.kick}"
                            target="_blank"
                            class="text-sm font-bold text-white capitalize hover:text-green-400 transition"
                          >
                            ${c.kick}
                          </a>
                        </div>
                      </div>
                    </div>
                  `
                      : ""
                  }
                  ${
                    c.youtube
                      ? `
                    <div class="mb-4 w-full bg-gradient-to-r from-red-500/10 to-red-500/10 border border-red-500/30 rounded-lg p-3">
                      <div class="flex items-center gap-2">
                        <img src="/youtube.png" alt="Kick" class="fill-white w-8 h-8 mr-1" />
                        <div class="flex-1">
                          <div class="text-xs font-semibold text-red-400 uppercase tracking-wide">Youtube</div>
                          <a
                            href="https://youtube.com/channel/${c.youtube}"
                            target="_blank"
                            class="text-sm font-bold text-white capitalize hover:text-red-400 transition"
                          >
                            ${c.display_name}
                          </a>
                        </div>
                      </div>
                    </div>
                  `
                      : ""
                  }
                </div>

                <!-- Games Section -->
                ${
                  c.games.length > 0
                    ? `
                  <div class="mb-4">
                    <div class="text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Tracked Games</div>
                    <div class="flex flex-wrap gap-2">
                      ${c.games
                        .map(
                          (g, gameIdx) => `
                        <span class="game-tag inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-medium text-purple-300">
                          ${g}
                          <button 
                            class="remove-game-btn hover:text-red-400 transition" 
                            data-idx="${idx}" 
                            data-game-idx="${gameIdx}"
                            title="Remove game"
                          >
                            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                              <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                            </svg>
                          </button>
                        </span>
                      `
                        )
                        .join("")}
                    </div>
                  </div>
                `
                    : ""
                }

                <!-- Add Game -->
                <div class="flex gap-2 mb-4">
                  <input 
                    type="text" 
                    placeholder="Add game to track..." 
                    class="add-game-input flex-1 bg-gray-700 text-white rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-purple-500 transition" 
                    data-idx="${idx}"
                  />
                  <button 
                    class="add-game-btn btn-success px-4 py-2 rounded-lg text-sm font-semibold text-white whitespace-nowrap"
                    data-idx="${idx}"
                  >
                    Add
                  </button>
                </div>

                <!-- Priority Order -->
                <div class="mb-4">
                  <div class="text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">
                    Priority order
                  </div>
                  <div class="flex gap-2">
                    ${normalizePriority(c.priority)
                      .map((platform) => {
                        const labels = {
                          twt: { label: "Twitch", icon: "<img src=\"/twitch.png\" alt=\"Twitch\" class=\"w-4 h-4\" />", class: "btn-twt", color: "border-[#9146FF]" },
                          ytb: { label: "YouTube", icon: "<img src=\"/youtube.png\" alt=\"YouTube\" class=\"w-4 h-4\" />", class: "btn-ytb", color: "border-[#FF0033]" },
                          kick: { label: "Kick", icon: "<img src=\"/kick.svg\" alt=\"Kick\" class=\"w-4 h-4\" />", class: "btn-kick", color: "border-[#53FC18]" },
                        };
                        const config = labels[platform] || { label: platform, icon: "" };
                        const isConfigured =
                          (platform === "kick" && c.kick) ||
                          (platform === "ytb" && c.youtube) ||
                          platform === "twt";

                        return `
                          <button
                            type="button"
                            class="priority-platform-btn flex-1 px-3 py-2 rounded-lg text-sm font-semibold flex items-center justify-center gap-2 border transition ${
                              isConfigured
                                ? `${config.class} text-white ${config.color} hover:${config.color}/80`
                                : `bg-gray-800/70 text-gray-400 ${config.color} hover:${config.color}/50`
                            }"
                            data-idx="${idx}"
                            data-platform="${platform}"
                            draggable="true"
                          >
                            ${config.icon}
                            <span>${config.label}</span>
                          </button>
                        `;
                      })
                      .join("")}
                  </div>
                  <div class="text-[11px] text-gray-500 mt-2">
                    Drag the platforms to change the priority order.
                  </div>
                </div>

                <div class="py-2">
                    <button
                      class="border uppercase text-xs border-red-500 bg-red-500 hover:bg-red-500/40 transition w-full text-center gap-4 flex items-center justify-center px-4 py-2 rounded-lg text-sm font-semibold text-white"
                      data-idx="${idx}"
                      draggable
                    >
                      <img src="/trash.svg" alt="delete" class="w-4 h-4" />
                      Delete Channel
                    </button>
                  </div>
              </div>
            </div>
          `
          )
          .join("");

        // Attach event listeners
        attachEventListeners();
      }

      function attachEventListeners() {
        document.querySelectorAll(".priority-platform-btn").forEach((btn) => {
          btn.ondragstart = (event) => {
            event.dataTransfer.effectAllowed = "move";
            window.draggedPriority = {
              idx: Number(btn.getAttribute("data-idx")),
              platform: btn.getAttribute("data-platform"),
            };
          };

          btn.ondragover = (event) => {
            event.preventDefault();
            btn.classList.add("ring-2", "ring-purple-400");
          };

          btn.ondragleave = () => {
            btn.classList.remove("ring-2", "ring-purple-400");
          };

          btn.ondrop = async (event) => {
            event.preventDefault();
            btn.classList.remove("ring-2", "ring-purple-400");

            const source = window.draggedPriority;
            const target = {
              idx: Number(btn.getAttribute("data-idx")),
              platform: btn.getAttribute("data-platform"),
            };

            if (!source || source.idx !== target.idx) {
              window.draggedPriority = null;
              return;
            }

            const channel = window.channels?.[target.idx];
            if (!channel) {
              window.draggedPriority = null;
              return;
            }

            const currentPriority = normalizePriority(channel.priority);
            const fromIndex = currentPriority.indexOf(source.platform);
            const toIndex = currentPriority.indexOf(target.platform);

            if (fromIndex === -1 || toIndex === -1 || fromIndex === toIndex) {
              window.draggedPriority = null;
              return;
            }

            const nextPriority = [...currentPriority];
            const [moved] = nextPriority.splice(fromIndex, 1);
            nextPriority.splice(toIndex, 0, moved);

            channel.priority = normalizePriority(nextPriority);
            await fetch("/api/update-priority-order", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                channel: channel.display_name,
                priority: channel.priority,
              }),
            });

            renderChannels(window.channels);
            window.draggedPriority = null;
          };

          btn.ondragend = () => {
            window.draggedPriority = null;
            document.querySelectorAll(".priority-platform-btn").forEach((el) => {
              el.classList.remove("ring-2", "ring-purple-400");
            });
          };

          btn.onclick = async (event) => {
            const channelIdx = Number(btn.getAttribute("data-idx"));
            const platform = btn.getAttribute("data-platform");
            if (platform === "twt") return;

            selectedTwitchIdx = channelIdx;
            if (platform === "kick") {
              document.getElementById("addKickDialog").showModal();
              document.getElementById("addKickInput").value = "";
              document.getElementById("addKickMessage").textContent = "";
              return;
            }

            if (platform === "ytb") {
              document.getElementById("addYoutubeDialog").showModal();
              document.getElementById("addYoutubeInput").value = "";
              document.getElementById("addYoutubeMessage").textContent = "";
            }
          };
        });

        // Add Game
        document.querySelectorAll(".add-game-btn").forEach((btn) => {
          btn.onclick = async () => {
            const idx = btn.getAttribute("data-idx");
            const input = document.querySelector(
              `.add-game-input[data-idx="${idx}"]`
            );
            const game = input.value.trim();
            if (!game) return;

            await fetch("/api/add-game", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                channel: window.channels[idx].display_name,
                game,
              }),
            });
            input.value = "";
            location.reload();
          };
        });

        // Remove Channel
        document.querySelectorAll(".remove-channel-btn").forEach((btn) => {
          btn.onclick = async () => {
            const idx = btn.getAttribute("data-idx");
            if (
              !confirm(`Remove channel ${window.channels[idx].display_name}?`)
            )
              return;

            await fetch("/api/remove-channel", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                channel: window.channels[idx].display_name,
              }),
            });
            location.reload();
          };
        });

        // Remove Game
        document.querySelectorAll(".remove-game-btn").forEach((btn) => {
          btn.onclick = async () => {
            const idx = btn.getAttribute("data-idx");
            const gameIdx = btn.getAttribute("data-game-idx");
            const channelName = window.channels[idx].display_name;
            const gameName = window.channels[idx].games[gameIdx];

            if (!confirm(`Remove game "${gameName}" from ${channelName}?`))
              return;

            await fetch("/api/remove-game", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ channel: channelName, game: gameName }),
            });
            location.reload();
          };
        });
      }

      // Service Worker Registration
      if ("serviceWorker" in navigator && "Notification" in window) {
        navigator.serviceWorker.register("/sw.js").then(async function (reg) {
          console.log("Service Worker registered");

          // Check notification permission
          let permission = Notification.permission;

          if (permission === "default") {
            // Request permission
            permission = await Notification.requestPermission();
          }

          if (permission === "granted") {
            console.log("Notification permission granted");

            const key = "BO3X9jaW74ubvrJv8BUZN2-9WoWil6tp2aD-27UHjMEi3EoF_P1DZoLE34FY4p4BPTYTf43zQ5fXmsyXxy--oLw";
            try {
              const subscription = await reg.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: urlBase64ToUint8Array(key),
              });

              console.log("Push subscription successful");
              fetch("/api/subscribe", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(subscription),
              });
            } catch (error) {
              console.error("Push subscription failed:", error);
            }
          } else {
            console.log("Notification permission denied or not supported");
            // You could show a message to the user here
          }

          // Update notification status display
          updateNotificationStatus(permission);
        }).catch(function (error) {
          console.error("Service Worker registration failed:", error);
          updateNotificationStatus("error");
        });
      } else {
        console.log("Service Worker or Notifications not supported");
        updateNotificationStatus("unsupported");
      }

      function updateNotificationStatus(permission) {
        const statusElement = document.getElementById("notificationStatus");
        statusElement.classList.remove("hidden");

        if (permission === "granted") {
          statusElement.innerHTML = `
            <div class="flex items-center gap-2 text-green-400">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
              </svg>
              <span class="text-sm font-medium">Notifications enabled</span>
            </div>
          `;
        } else if (permission === "denied") {
          statusElement.innerHTML = `
            <div class="flex items-center gap-2 text-red-400">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
              </svg>
              <span class="text-sm font-medium">Notifications blocked</span>
              <button id="enableNotifications" class="text-xs underline hover:text-red-300">Enable</button>
            </div>
          `;
          document.getElementById("enableNotifications").onclick = async () => {
            const newPermission = await Notification.requestPermission();
            updateNotificationStatus(newPermission);
            if (newPermission === "granted") {
              location.reload(); // Reload to trigger subscription
            }
          };
        } else if (permission === "default") {
          statusElement.innerHTML = `
            <div class="flex items-center gap-2 text-yellow-400">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
              </svg>
              <span class="text-sm font-medium">Notifications not requested</span>
              <button id="requestNotifications" class="text-xs underline hover:text-yellow-300">Enable</button>
            </div>
          `;
          document.getElementById("requestNotifications").onclick = async () => {
            const newPermission = await Notification.requestPermission();
            updateNotificationStatus(newPermission);
            if (newPermission === "granted") {
              location.reload(); // Reload to trigger subscription
            }
          };
        } else if (permission === "unsupported") {
          statusElement.innerHTML = `
            <div class="flex items-center gap-2 text-gray-400">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
              </svg>
              <span class="text-sm font-medium">Notifications not supported</span>
            </div>
          `;
        } else {
          statusElement.innerHTML = `
            <div class="flex items-center gap-2 text-gray-400">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
              </svg>
              <span class="text-sm font-medium">Notification error</span>
            </div>
          `;
        }
      }

      function urlBase64ToUint8Array(base64String) {
        const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
        const base64 = (base64String + padding)
          .replace(/-/g, "+")
          .replace(/_/g, "/");
        const rawData = window.atob(base64);
        const outputArray = new Uint8Array(rawData.length);
        for (let i = 0; i < rawData.length; ++i) {
          outputArray[i] = rawData.charCodeAt(i);
        }
        return outputArray;
      }

      // Initialize
      loadChannels();
    </script>
  </body>
</html>
